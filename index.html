<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLI Text Fixer — CLI出力の改行崩れを直す</title>
  <meta name="description" content="CLIやAIの出力をペーストするだけで、不要な改行を自動除去。段落・リスト・コードブロックは維持。">

  <!-- OGP -->
  <meta property="og:title" content="CLI Text Fixer — CLI出力の改行崩れを直す">
  <meta property="og:description" content="CLIやAIの出力をペーストするだけで、不要な改行を自動除去。段落・リスト・コードブロックは維持。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://fukuma-dev.github.io/cli-text-fixer/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CLI Text Fixer — CLI出力の改行崩れを直す">
  <meta name="twitter:description" content="CLIやAIの出力をペーストするだけで、不要な改行を自動除去。段落・リスト・コードブロックは維持。">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a2e;
      --bg-panel: #16213e;
      --bg-input: #0f3460;
      --bg-surface: #1e2a45;
      --accent: #15803D;
      --accent-hover: #22C55E;
      --accent-dim: rgba(34, 197, 94, 0.15);
      --text: #e8eaf6;
      --text-muted: #7986a8;
      --text-dim: #4a5580;
      --border: #253058;
      --border-focus: #15803D;
      --success: #4caf8a;
      --success-dim: rgba(76, 175, 138, 0.15);
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .logo-name span {
      color: var(--accent);
    }

    .tagline {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .header-badge {
      font-size: 11px;
      font-family: var(--mono);
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
      gap: 16px;
      overflow: hidden;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* ── Panel ── */
    .panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .panel:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .panel-label .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
    }

    .panel-label .dot.active {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .char-count {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
    }

    /* ── Textarea ── */
    textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--text-dim);
      line-height: 1.6;
    }

    textarea::-webkit-scrollbar,
    .output-text::-webkit-scrollbar {
      width: 6px;
    }

    textarea::-webkit-scrollbar-track,
    .output-text::-webkit-scrollbar-track {
      background: transparent;
    }

    textarea::-webkit-scrollbar-thumb,
    .output-text::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Output ── */
    .output-text {
      flex: 1;
      padding: 16px;
      font-family: var(--sans);
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
    }

    .output-placeholder .icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    .output-placeholder p {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* ── Action buttons ── */
    .panel-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg-input);
      color: var(--text);
      border-color: var(--text-dim);
    }

    .btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }

    .btn-success {
      background: var(--success-dim);
      border-color: var(--success);
      color: var(--success) !important;
    }

    .btn-success svg {
      stroke: var(--success);
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 11.5px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label {
      color: var(--text-dim);
    }

    .stat-value {
      color: var(--text);
      font-weight: 600;
    }

    .stat-value.accent {
      color: var(--accent);
    }

    .stat-sep {
      color: var(--border);
    }

    /* ── Footer ── */
    footer {
      padding: 14px 32px;
      border-top: 1px solid var(--border);
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .footer-left {
      font-size: 12px;
      color: var(--text-dim);
    }

    .footer-left span {
      color: var(--accent);
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .footer-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-link:hover {
      color: var(--text);
    }

    .footer-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      header {
        padding: 14px 16px;
      }

      main {
        padding: 16px;
      }

      .panels {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .stats-bar {
        flex-wrap: wrap;
        gap: 10px;
      }

      footer {
        padding: 12px 16px;
        flex-direction: column;
        gap: 8px;
        text-align: center;
      }

      .header-badge {
        display: none;
      }
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-text:not(.empty) {
      animation: fadeIn 0.15s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .dot.active {
      animation: pulse 2s infinite;
    }
  </style>
</head>

  <header>
    <div class="logo-wrap">

      <div class="panel" id="panel-input">

            <div id="segment-toggle" style="display:inline-flex;position:relative;background:var(--bg);border-radius:6px;padding:2px;font-size:11px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;">

    <!-- Privacy note (compact) -->
    <div style="max-width:720px;margin:0.8rem auto 0;padding:0 1rem;text-align:center;">

  <script>
    // ── CLI Text Fixer core logic ──
    // Smart join: no space between CJK characters, space otherwise
    function smartJoin(parts) {
      if (parts.length === 0) return '';
      let result = parts[0];
      const cjk = /[\u3000-\u9fff\uf900-\ufaff\uff00-\uffef]/;
      for (let i = 1; i < parts.length; i++) {
        const prev = result.slice(-1);
        const next = parts[i].charAt(0);
        const sep = (cjk.test(prev) && cjk.test(next)) ? '' : ' ';
        result += sep + parts[i];
      }
      return result;
    }

    // ── Box-drawing table → Markdown table ──
    function convertBoxTable(text) {
      const lines = text.split('\n');
      const result = [];
      let i = 0;

      // Detect if a block is a box table (has border lines + data rows with 3+ separators)
      function isBoxTableStart(idx) {
        // Look for a top border line or a data row with multiple │
        const l = lines[idx].trim();
        if (/^[┌╔╭┏╒╓]/.test(l) && /[─━═]/.test(l)) return true;
        // Data row needs at least 3 │ (left border, separator, right border)
        if ((l.match(/[│┃║]/g) || []).length >= 3) {
          // Also check it's not a tree line (tree uses │ for vertical connectors only)
          if (!/[├└┣┗]/.test(l)) return true;
        }
        return false;
      }

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        // Detect box-drawing table: needs 3+ vertical separators (not tree lines)
        const vertCount = (trimmed.match(/[│┃║]/g) || []).length;
        if (vertCount >= 3 && !/[├└┣┗][─━]/.test(trimmed)) {
          // Collect entire box table block
          const tableLines = [];
          const startIdx = i;

          // Check if previous line was a top border
          if (result.length > 0 && /^[┌╔╭┏╒╓]/.test(result[result.length - 1].trim())) {
            result.pop(); // remove top border from result
          }

          while (i < lines.length) {
            const tl = lines[i].trim();
            // Border lines (top/mid/bottom): ┌─┬─┐ ├─┼─┤ └─┴─┘ and double/round variants
            if (/^[┌├└╔╠╚╭╰┏┣┗╒╞╘╓╟╙]/.test(tl) && /[─━═]/.test(tl)) {
              i++;
              continue; // skip border lines
            }
            // Data row with vertical separators
            if (/[│┃║]/.test(tl) && /[│┃║].*[│┃║]/.test(tl)) {
              tableLines.push(tl);
              i++;
              continue;
            }
            break;
          }

          if (tableLines.length > 0) {
            // Parse cells from each data row
            const parsed = tableLines.map(row => {
              // Split by │, ┃, or ║, trim each cell, remove leading/trailing empty
              const cells = row.split(/[│┃║]/).map(c => c.trim());
              // Remove first and last if empty (outer borders)
              if (cells.length > 0 && cells[0] === '') cells.shift();
              if (cells.length > 0 && cells[cells.length - 1] === '') cells.pop();
              return cells;
            });

            // Build markdown table
            if (parsed.length > 0) {
              const colCount = Math.max(...parsed.map(r => r.length));
              const pad = row => {
                while (row.length < colCount) row.push('');
                return row;
              };

              // First row as header
              result.push('| ' + pad(parsed[0]).join(' | ') + ' |');
              result.push('|' + pad(Array(colCount).fill('')).map(() => '---').join('|') + '|');
              // Remaining rows as body
              for (let r = 1; r < parsed.length; r++) {
                result.push('| ' + pad(parsed[r]).join(' | ') + ' |');
              }
            }
          }
          continue;
        }

        result.push(line);
        i++;
      }

      return result.join('\n');
    }

    // ── Tree display → indented list ──
    function convertTree(text) {
      const lines = text.split('\n');
      const result = [];

      // Detect if we're in a tree block (consecutive lines with tree chars)
      let inTree = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Match tree lines: ├── item, └── item, with optional │ prefixes
        const treeMatch = line.match(/^([\s│┃|]*)[├└┣┗][─━]+\s*(.+)/);
        if (treeMatch) {
          inTree = true;
          // Calculate depth by counting vertical bars + measuring indent blocks
          const prefix = treeMatch[1];
          // Each level is typically "│   " (bar + spaces) or "    " (spaces)
          // Count │ characters as depth indicator
          const bars = (prefix.match(/[│┃|]/g) || []).length;
          const indent = '  '.repeat(bars);
          result.push(indent + '- ' + treeMatch[2].trim());
          continue;
        }

        // Skip pure connector lines (│ only, within a tree)
        if (inTree && /^\s*[│┃|]\s*$/.test(line)) {
          continue;
        }

        // Root of tree (line before ├/└ starts, no tree chars itself)
        // Check if next line starts a tree
        if (!inTree && i + 1 < lines.length && /^[\s│┃|]*[├└┣┗]/.test(lines[i + 1])) {
          result.push('- ' + line.trim());
          inTree = true;
          continue;
        }

        if (line.trim() === '') inTree = false;
        result.push(line);
      }

      return result.join('\n');
    }

    function fixLines(text) {
      if (!text.trim()) return '';

      // Pre-process: convert box tables and tree displays
      text = convertBoxTable(text);
      text = convertTree(text);

      // Strip leading whitespace per line (left-align)
      // Keep relative indent for lines starting with list markers or code
      let lines = text.split('\n');
      // Strip leading spaces, but preserve inside code blocks and box-drawing tables
      let inFence = false;
      lines = lines.map(l => {
        if (l.trim().startsWith('```')) { inFence = !inFence; return l.replace(/^ +/, ''); }
        if (inFence) return l; // preserve code indent
        if (/^\s*[│┌├└┐┤┘┬┴╔╠╚╗╣╝╦╩═╭╰╮╯]/.test(l)) return l.replace(/^ +/, ''); // left-align but keep internal spacing
        // Preserve indent for list items (converted tree output etc.)
        if (/^\s+([-*+]|\d+\.)\s/.test(l)) return l;
        return l.replace(/^ +/, '');
      });
      const result = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        // Empty line → paragraph break, preserve
        if (line.trim() === '') {
          result.push('');
          i++;
          continue;
        }

        // Code block: ``` ... ```
        if (line.trim().startsWith('```')) {
          result.push(line);
          i++;
          while (i < lines.length) {
            const cl = lines[i];
            result.push(cl);
            i++;
            if (cl.trim().startsWith('```')) break;
          }
          continue;
        }

        // Heading: # ## ### etc.
        if (/^#{1,6}\s/.test(line)) {
          result.push(line);
          i++;
          continue;
        }

        // Horizontal rule
        if (/^(---+|===+|\*\*\*+)$/.test(line.trim())) {
          result.push(line);
          i++;
          continue;
        }

        // Table: starts with | or box-drawing characters (│┌├└┐┤┘┬┴─)
        if (/^\s*[|│┌├└┐┤┘┬┴╔╠╚╗╣╝╦╩═╭╰╮╯]/.test(line)) {
          result.push(line);
          i++;
          continue;
        }

        // Blockquote: starts with >
        if (/^\s*>/.test(line)) {
          result.push(line);
          i++;
          continue;
        }

        // Indented code (4 spaces or tab)
        if (/^( {4}|\t)/.test(line)) {
          result.push(line);
          i++;
          continue;
        }

        // List items: -, *, +, or numbered 1. — merge wrapped continuation lines
        if (/^\s*([-*+]|\d+\.)\s/.test(line)) {
          const parts = [line.trimEnd()];
          i++;
          while (i < lines.length) {
            const next = lines[i];
            const prev = parts[parts.length - 1];
            // Stop if previous line ends with sentence-ending punctuation
            if (/[。．.!！?？)）」』】\]]$/.test(prev.trim())) break;
            // Stop if: empty, new list item, heading, code, table, blockquote, fence, rule
            if (
              next.trim() === '' ||
              /^\s*([-*+]|\d+\.)\s/.test(next) ||
              /^#{1,6}\s/.test(next) ||
              next.trim().startsWith('```') ||
              /^\s*[|│┌├└┐┤┘┬┴╔╠╚╗╣╝╦╩═╭╰╮╯]/.test(next) ||
              /^\s*>/.test(next) ||
              /^( {4}|\t)/.test(next) ||
              /^(---+|===+|\*\*\*+)$/.test(next.trim())
            ) {
              break;
            }
            // Continuation line — merge
            parts.push(next.trim());
            i++;
          }
          result.push(smartJoin(parts));
          continue;
        }

        // Regular paragraph text — merge consecutive lines
        const paragraph = [line.trimEnd()];
        i++;
        while (i < lines.length) {
          const next = lines[i];
          const prev = paragraph[paragraph.length - 1];

          // Stop if previous line ends with sentence-ending punctuation
          if (/[。．.!！?？)）」』】\]]$/.test(prev.trim())) break;

          // Stop merging on: empty line, special syntax
          if (
            next.trim() === '' ||
            next.trim().startsWith('```') ||
            /^#{1,6}\s/.test(next) ||
            /^\s*[|│┌├└┐┤┘┬┴╔╠╚╗╣╝╦╩═╭╰╮╯]/.test(next) ||
            /^\s*>/.test(next) ||
            /^( {4}|\t)/.test(next) ||
            /^\s*([-*+]|\d+\.)\s/.test(next) ||
            /^(---+|===+|\*\*\*+)$/.test(next.trim())
          ) {
            break;
          }

          paragraph.push(next.trimEnd());
          i++;
        }

        result.push(smartJoin(paragraph));
      }

      // Normalize: collapse 3+ consecutive blank lines → 2
      const normalized = [];
      let blankCount = 0;
      for (const line of result) {
        if (line === '') {
          blankCount++;
          if (blankCount <= 2) normalized.push(line);
        } else {
          blankCount = 0;
          normalized.push(line);
        }
      }

      return normalized.join('\n').trim();
    }

    // ── DOM refs ──
    const inputEl     = document.getElementById('input');
    const outputEl    = document.getElementById('output');
    const previewEl   = document.getElementById('output-preview');
    const segText     = document.getElementById('seg-text');
    const segMd       = document.getElementById('seg-md');
    const btnCopy     = document.getElementById('btn-copy');
    const btnClear    = document.getElementById('btn-clear');
    let previewMode = false;
    const inputCount  = document.getElementById('input-count');
    const outputCount = document.getElementById('output-count');
    const inputDot    = document.getElementById('input-dot');
    const outputDot   = document.getElementById('output-dot');
    const statsBar    = document.getElementById('stats-bar');
    const statInLines  = document.getElementById('stat-in-lines');
    const statOutLines = document.getElementById('stat-out-lines');
    const statSaved    = document.getElementById('stat-saved');
    const statMode     = document.getElementById('stat-mode');
    const copyIcon    = document.getElementById('copy-icon');
    const checkIcon   = document.getElementById('check-icon');
    const copyLabel   = document.getElementById('copy-label');

    let copyTimeout = null;

    function countChars(str) {
      return str.length;
    }

    function fmtChars(n) {
      if (n === 0) return '0 chars';
      return n.toLocaleString('ja-JP') + ' chars';
    }

    function detectMode(text) {
      if (!text.trim()) return '—';
      const lines = text.split('\n');
      const hasCode = lines.some(l => l.trim().startsWith('```'));
      const hasMd = lines.some(l => /^#{1,6}\s/.test(l) || /^\s*([-*+]|\d+\.)\s/.test(l));
      const hasTable = lines.some(l => /^\s*\|/.test(l));
      if (hasCode) return 'Markdown + Code';
      if (hasMd && hasTable) return 'Markdown + Table';
      if (hasMd) return 'Markdown';
      if (hasTable) return 'Table';
      return 'Plain text';
    }

    function update() {
      const raw = inputEl.value;
      const chars = countChars(raw);

      inputCount.textContent = fmtChars(chars);

      if (!raw.trim()) {
        outputEl.value = '';
        outputEl.classList.add('empty');
        outputCount.textContent = '0 chars';
        outputDot.classList.remove('active');
        statsBar.style.display = 'none';
        btnCopy.disabled = true;
        btnCopy.style.opacity = '0.5';
        return;
      }

      const fixed = fixLines(raw);
      outputEl.value = fixed;
      outputEl.classList.remove('empty');
      outputDot.classList.add('active');
      btnCopy.disabled = false;
      btnCopy.style.opacity = '';

      const outChars = countChars(fixed);
      outputCount.textContent = fmtChars(outChars);

      // Stats
      const inLines  = raw.split('\n').length;
      const outLines = fixed.split('\n').length;
      const saved    = Math.max(0, inLines - outLines);
      statInLines.textContent  = inLines.toLocaleString('ja-JP');
      statOutLines.textContent = outLines.toLocaleString('ja-JP');
      statSaved.textContent    = saved.toLocaleString('ja-JP');
      statMode.textContent     = detectMode(raw);
      statsBar.style.display   = '';

      // Update preview if in preview mode
      if (previewMode) {
        previewEl.innerHTML = mdToHtml(fixed);
      }
    }

    // ── Events ──
    inputEl.addEventListener('input', update);

    inputEl.addEventListener('focus', () => {
      inputDot.classList.add('active');
    });
    inputEl.addEventListener('blur', () => {
      if (!inputEl.value.trim()) inputDot.classList.remove('active');
    });

    btnClear.addEventListener('click', () => {
      inputEl.value = '';
      update();
      inputEl.focus();
    });

    btnCopy.addEventListener('click', async () => {
      const text = outputEl.value;
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      // Success animation
      btnCopy.classList.remove('btn-primary');
      btnCopy.classList.add('btn-success');
      copyIcon.style.display = 'none';
      checkIcon.style.display = '';
      copyLabel.textContent = 'Copied!';

      if (copyTimeout) clearTimeout(copyTimeout);
      copyTimeout = setTimeout(() => {
        btnCopy.classList.add('btn-primary');
        btnCopy.classList.remove('btn-success');
        copyIcon.style.display = '';
        checkIcon.style.display = 'none';
        copyLabel.textContent = 'Copy';
        copyTimeout = null;
      }, 2000);
    });

    // Simple Markdown → HTML
    function mdToHtml(text) {
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const lines = text.split('\n');
      let html = '', inCode = false, inList = false, listType = '';
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.trim().startsWith('```')) {
          if (inCode) { html += '</code></pre>'; inCode = false; }
          else { html += '<pre style="background:var(--bg);padding:12px;border-radius:6px;overflow-x:auto;margin:8px 0"><code>'; inCode = true; }
          continue;
        }
        if (inCode) { html += esc(line) + '\n'; continue; }
        if (line.trim() === '') {
          if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
          html += '<br>'; continue;
        }
        const hm = line.match(/^(#{1,6})\s+(.+)/);
        if (hm) { const lv = hm[1].length; html += `<h${lv} style="margin:12px 0 6px;font-size:${1.3-lv*0.1}em">${esc(hm[2])}</h${lv}>`; continue; }
        const lm = line.match(/^\s*([-*+])\s+(.+)/);
        if (lm) { if (!inList || listType !== 'ul') { if (inList) html += '</ol>'; html += '<ul style="padding-left:1.5em;margin:4px 0">'; inList = true; listType = 'ul'; } html += `<li>${esc(lm[2])}</li>`; continue; }
        const nm = line.match(/^\s*(\d+)\.\s+(.+)/);
        if (nm) { if (!inList || listType !== 'ol') { if (inList) html += '</ul>'; html += '<ol style="padding-left:1.5em;margin:4px 0">'; inList = true; listType = 'ol'; } html += `<li>${esc(nm[2])}</li>`; continue; }
        // Markdown table: | cell | cell |
        if (/^\|(.+)\|$/.test(line.trim())) {
          if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
          // Skip separator lines (|---|---|)
          if (/^\|[\s\-:|]+\|$/.test(line.trim()) && /---/.test(line)) { continue; }
          const cells = line.trim().split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(c => esc(c.trim()));
          // Check if next line is separator → this is header
          const nextIsSep = i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim()) && /---/.test(lines[i + 1]);
          // Check if previous was not a table line → start of table
          const prevIsTable = i > 0 && /^\|(.+)\|$/.test(lines[i - 1].trim());
          if (!prevIsTable) {
            // Start new table
            html += '<table style="border-collapse:collapse;margin:8px 0;width:100%">';
          }
          if (nextIsSep) {
            html += '<thead><tr>';
            cells.forEach(c => { html += `<th style="border:1px solid var(--border);padding:8px 12px;background:var(--bg-surface);text-align:left;font-size:0.9em">${c}</th>`; });
            html += '</tr></thead><tbody>';
            i++; // skip separator line
          } else {
            html += '<tr>';
            cells.forEach(c => { html += `<td style="border:1px solid var(--border);padding:8px 12px;font-size:0.9em">${c}</td>`; });
            html += '</tr>';
          }
          // Check if next line is NOT a table row → close table
          if (i + 1 >= lines.length || !/^\|/.test(lines[i + 1].trim())) {
            html += '</tbody></table>';
          }
          continue;
        }

        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        let p = esc(line);
        p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        p = p.replace(/`(.+?)`/g, '<code style="background:var(--bg);padding:2px 5px;border-radius:3px;font-size:0.9em">$1</code>');
        html += `<p style="margin:4px 0">${p}</p>`;
      }
      if (inCode) html += '</code></pre>';
      if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
      return html;
    }

    // Segment toggle with fade
    const segSlider = document.getElementById('seg-slider');

    function updateSlider(isMd) {
      const target = isMd ? segMd : segText;
      const toggle = document.getElementById('segment-toggle');
      const toggleRect = toggle.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      segSlider.style.width = targetRect.width + 'px';
      segSlider.style.transform = 'translateX(' + (targetRect.left - toggleRect.left - 2) + 'px)';
    }

    // Init slider position
    requestAnimationFrame(() => updateSlider(false));

    function setSegment(isMd) {
      previewMode = isMd;
      // Slide indicator
      updateSlider(isMd);
      if (isMd) {
        segMd.style.color = '#fff';
        segText.style.color = 'var(--text-muted)';
        outputEl.style.opacity = '0';
        outputEl.style.transform = 'translateY(4px)';
        setTimeout(() => {
          outputEl.style.display = 'none';
          previewEl.style.display = 'block';
          previewEl.innerHTML = mdToHtml(outputEl.value);
          requestAnimationFrame(() => {
            previewEl.style.opacity = '1';
            previewEl.style.transform = 'translateY(0)';
          });
        }, 250);
      } else {
        segText.style.color = '#fff';
        segMd.style.color = 'var(--text-muted)';
        previewEl.style.opacity = '0';
        previewEl.style.transform = 'translateY(4px)';
        setTimeout(() => {
          previewEl.style.display = 'none';
          outputEl.style.display = '';
          requestAnimationFrame(() => {
            outputEl.style.opacity = '1';
            outputEl.style.transform = 'translateY(0)';
          });
        }, 250);
      }
    }
    document.getElementById('segment-toggle').addEventListener('click', () => setSegment(!previewMode));

    // Initial state
    btnCopy.disabled = true;
    btnCopy.style.opacity = '0.5';

    // Handle initial value (e.g. from bfcache)
    if (inputEl.value) update();
  </script>
</body>
</html>
